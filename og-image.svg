<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16213e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="beamGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f97316;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#fb923c;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGradient)"/>
  
  <!-- Decorative circles -->
  <circle cx="100" cy="100" r="150" fill="#f97316" opacity="0.1"/>
  <circle cx="1100" cy="530" r="200" fill="#f97316" opacity="0.1"/>
  
  <!-- Beam Logo/Icon -->
  <g transform="translate(500, 180)">
    <path d="M100 0 L50 140 L100 140 L100 270 L150 130 L100 130 L100 0" fill="url(#beamGradient)"/>
  </g>
  
  <!-- Title -->
  <text x="600" y="380" font-family="system-ui, -apple-system, sans-serif" font-size="72" font-weight="bold" fill="white" text-anchor="middle">Beam</text>
  
  <!-- Tagline -->
  <text x="600" y="440" font-family="system-ui, -apple-system, sans-serif" font-size="28" fill="#a1a1aa" text-anchor="middle">Professional Quotes in Seconds</text>
  
  <!-- Features -->
  <g transform="translate(200, 500)">
    <text x="0" y="0" font-family="system-ui, -apple-system, sans-serif" font-size="20" fill="#f97316">⚡ PDF Generation</text>
  </g>
  <g transform="translate(450, 500)">
    <text x="0" y="0" font-family="system-ui, -apple-system, sans-serif" font-size="20" fill="#f97316">📱 SMS Delivery</text>
  </g>
  <g transform="translate(700, 500)">
    <text x="0" y="0" font-family="system-ui, -apple-system, sans-serif" font-size="20" fill="#f97316">📋 Template Library</text>
  </g>
  
  <!-- URL -->
  <text x="600" y="590" font-family="system-ui, -apple-system, sans-serif" font-size="18" fill="#71717a" text-anchor="middle">luinbytes.github.io/beam</text>
</svg>
